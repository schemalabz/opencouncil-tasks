name: Cleanup PR Preview

on:
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  pull-requests: write
  issues: write
  actions: write

# Ensure only one cleanup runs at a time per PR
concurrency:
  group: preview-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  # Decide whether a preview was ever deployed for this PR, and cancel any
  # deploy runs still waiting for approval. Runs without an environment so
  # closing an undeployed PR never triggers an approval prompt.
  check:
    name: Check Cleanup Eligibility
    runs-on: ubuntu-latest
    outputs:
      deployed: ${{ steps.check-deploy.outputs.deployed }}
    steps:
      - name: Check whether a preview was deployed
        id: check-deploy
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            // The deploy job's first step (which only runs after approval)
            // posts a comment containing "Preview deployment" — its presence
            // means a deploy was approved and a preview may exist on the host.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('Preview deployment')
            );

            core.setOutput('deployed', botComment ? 'true' : 'false');
            console.log(botComment
              ? 'Deploy comment found - preview cleanup is needed'
              : 'No deploy comment found - skipping cleanup');

      - name: Cancel deploy runs pending approval
        uses: actions/github-script@v9
        with:
          script: |
            // A deploy run waiting for environment approval would otherwise
            // linger in the Actions tab for 30 days after the PR closes.
            const headSha = context.payload.pull_request.head.sha;

            const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'preview-deploy.yml',
              head_sha: headSha,
            });

            for (const run of runs.filter(run => run.status !== 'completed')) {
              console.log(`Cancelling deploy run ${run.id} (status: ${run.status})`);
              await github.rest.actions.cancelWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
              });
            }

  cleanup:
    name: Destroy Preview Instance
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.deployed == 'true'
    environment: preview-cleanup
    steps:
      - name: Cleanup preview deployment
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PREVIEW_DEPLOY_SSH_KEY }}
          PREVIEW_HOST: ${{ secrets.PREVIEW_HOST }}
          PREVIEW_USER: ${{ secrets.PREVIEW_USER || 'opencouncil' }}
        run: |
          set -euo pipefail

          PR_NUM="${{ github.event.pull_request.number }}"
          PORT=$((4000 + PR_NUM))

          echo "Cleaning up preview for PR #$PR_NUM (port $PORT)"

          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$PREVIEW_HOST" >> ~/.ssh/known_hosts

          # Cleanup via SSH — pass PR_NUM as a positional argument since
          # the single-quoted heredoc prevents expression expansion on the remote.
          ssh -i ~/.ssh/deploy_key "${PREVIEW_USER}@${PREVIEW_HOST}" bash -s "$PR_NUM" <<'CLEANUP_SCRIPT'
            set -euo pipefail

            PR_NUM="$1"

            echo "Destroying preview instance for PR #$PR_NUM..."
            sudo opencouncil-tasks-preview-destroy "$PR_NUM" || {
              echo "Warning: Failed to destroy preview cleanly"
              exit 0
            }

            echo "Preview cleaned up successfully"
          CLEANUP_SCRIPT

          echo "### Preview Cleaned Up" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Preview for PR #$PR_NUM has been destroyed" >> $GITHUB_STEP_SUMMARY
          echo "- Systemd service stopped" >> $GITHUB_STEP_SUMMARY
          echo "- Caddy configuration removed" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            const body = '## Preview deployment cleaned up\n\n'
              + 'The preview instance for this PR has been destroyed.\n\n'
              + '**Removed:**\n'
              + '- Preview service (port ' + (4000 + prNumber) + ')\n'
              + '- Caddy reverse proxy configuration\n\n'
              + '---\n'
              + '*Automatic cleanup on PR close*';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body,
            });
